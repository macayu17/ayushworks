    <script>
      (() => {
        const savedTheme = localStorage.getItem('site-theme');
        const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.dataset.theme =
          savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : prefersLight
              ? 'light'
              : 'dark';
      })();
    </script>
